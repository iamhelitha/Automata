name: Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed to list all tags

      - name: Determine next version
        id: version
        run: |
          # Find the latest semver tag (e.g. v1.2.3) using git's built-in version sort
          LATEST_TAG=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" --sort=-version:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            # No tags yet — read the version already committed in build.gradle.kts
            CURRENT=$(grep -E '^\s*versionName\s*=' app/build.gradle.kts | sed 's/.*"\([^"]*\)".*/\1/' | head -1)
            NEW_VERSION="v${CURRENT}"
          else
            # Increment the patch component of the latest tag
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          VERSION_NAME="${NEW_VERSION#v}"
          MAJOR=$(echo "$VERSION_NAME" | cut -d. -f1)
          MINOR=$(echo "$VERSION_NAME" | cut -d. -f2)
          PATCH=$(echo "$VERSION_NAME" | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "tag=$NEW_VERSION"         >> "$GITHUB_OUTPUT"
          echo "name=$VERSION_NAME"       >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE"       >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── Signing ────────────────────────────────────────────────────────────
      # Optional. Configure these repository secrets to produce a signed APK:
      #   KEYSTORE_BASE64   – base64-encoded .jks / .keystore file
      #   KEYSTORE_PASSWORD – keystore password
      #   KEY_ALIAS         – key alias inside the keystore
      #   KEY_PASSWORD      – key password
      # If the secrets are absent the workflow falls back to a debug APK.
      - name: Set up signing
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
            printf 'storeFile=%s\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
              "$RUNNER_TEMP/keystore.jks" \
              "${{ secrets.KEYSTORE_PASSWORD }}" \
              "${{ secrets.KEY_ALIAS }}" \
              "${{ secrets.KEY_PASSWORD }}" > signing.properties
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build signed release APK
        if: steps.signing.outputs.signed == 'true'
        run: |
          ./gradlew assembleRelease \
            -PversionName="${{ steps.version.outputs.name }}" \
            -PversionCode="${{ steps.version.outputs.code }}"

      - name: Build debug APK (no signing secrets configured)
        if: steps.signing.outputs.signed != 'true'
        run: |
          ./gradlew assembleDebug \
            -PversionName="${{ steps.version.outputs.name }}" \
            -PversionCode="${{ steps.version.outputs.code }}"

      # ── Package ────────────────────────────────────────────────────────────
      - name: Locate and rename APK
        id: apk
        run: |
          if [ "${{ steps.signing.outputs.signed }}" == "true" ]; then
            APK="app/build/outputs/apk/release/app-release.apk"
          else
            APK="app/build/outputs/apk/debug/app-debug.apk"
          fi
          DEST="automata-${{ steps.version.outputs.tag }}.apk"
          cp "$APK" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      # ── Release ────────────────────────────────────────────────────────────
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Automata ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
